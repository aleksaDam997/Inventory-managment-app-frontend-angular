<div class="bg-white shadow-sm p-3 rounded mb-4 flex-shrink-0">
<h2>Katalog artikala</h2>
<p>Podaci o artiklima.</p>
</div>

<div class="d-flex justify-content-end mb-2 mx-3">
  <button class="btn btn-primary" (click)="openCreateOUModal()">Dodaj Proizvod</button>
</div>

<form class="row g-3 align-items-end mb-2 mx-3" [formGroup]="filterForm" (ngSubmit)="onFilterSubmit()">
  @if(role === 'ADMIN') {
    <div class="col-12 col-md-2">
      <label for="companySelected" class="form-label">Firma</label>
      <select id="companySelected" class="form-select" formControlName="companyId" required>
        <option value="0" selected>Sve firme</option>
        <option *ngFor="let company of companies" [value]="company.companyId">{{ company.name }}</option>
      </select>
    </div>

    <div class="col-12 col-md-2">
      <button class="btn btn-sm btn-outline-success w-100" type="submit">Filtriraj</button>
    </div>
  }
</form>

<div class="mt-3">
    <table class="table table-borderless text-left">
  <thead>
    <tr>
      <!-- <th scope="col">Id</th> -->
      <th scope="col">Naziv</th>
      <th scope="col">Cijena</th>
      <th scope="col">Akcije</th>
    </tr>
  </thead>
  <tbody>

    <tr *ngFor="let product of products;" class="align-middle">
      <!-- <td>{{ product.productId }}</td> -->
      <td>{{ product.name }}</td>
      <td>{{ product.price | number:'1.2-2' }} KM</td>     
      <td>
        <button class="btn btn-sm btn-outline-primary me-2" (click)="openUpdateOUModal(product)">
        <i class="bi bi-pencil"></i>
        </button>
        <button class="btn btn-sm btn-outline-danger" (click)="deleteProduct(product.productId)">
        <i class="bi bi-trash"></i>
        </button>
      </td>
    </tr>

  </tbody>
</table>
</div>
