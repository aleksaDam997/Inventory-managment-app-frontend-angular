<div class="modal fade" [ngClass]="{'show': show}" [ngStyle]="{'display': show ? 'block' : 'none'}" (click)="onBackdropClick()">
  <div class="modal-dialog modal-lg" (click)="onDialogClick($event)">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ title }}</h5>
        <button type="button" class="btn-close" (click)="close()"></button>
      </div>
      <div class="modal-body bg-light">

        
        <form [formGroup]="companyForm" (ngSubmit)="onSubmit()" novalidate>

            <div class="mb-3 me-1 w-50">
                <label for="name" class="form-label">Ime</label>
                <input
                type="text"
                id="name"
                class="form-control"
                formControlName="name"
                [ngClass]="{ 'is-invalid': submitted && companyForm.get('name')?.invalid }"
                placeholder="Unesite naziv firme"
                />
                <div *ngIf="submitted && companyForm.get('name')?.errors" class="invalid-feedback">
                <div *ngIf="companyForm.get('name')?.errors?.['required']">Naziv firme je obavezan.</div>
                </div>
            </div>


            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                type="email"
                id="email"
                class="form-control"
                formControlName="email"
                [ngClass]="{ 'is-invalid': submitted && companyForm.get('email')?.['invalid'] }"
                placeholder="Unesite email"
                />
                <div *ngIf="submitted && companyForm.get('email')?.errors" class="invalid-feedback">
                <div *ngIf="companyForm.get('email')?.errors?.['required']">Email je obavezan.</div>
                <div *ngIf="companyForm.get('email')?.errors?.['email']">Email nije validan.</div>
                </div>
            </div>

            <div class="mb-3 me-2 w-50">
                <label for="pib" class="form-label">Poreski identifikacioni broj</label>
                <input
                type="text"
                id="pib"
                class="form-control"
                formControlName="pib"
                [ngClass]="{ 'is-invalid': submitted && companyForm.get('pib')?.['invalid'] }"
                placeholder="Unesite PIB"
                />
            </div>

            <div class="mb-3 me-2 w-50">
                <label for="upin" class="form-label">Univerzalni personalni identifikacioni broj</label>
                <input
                type="text"
                id="upin"
                class="form-control"
                formControlName="upin"
                [ngClass]="{ 'is-invalid': submitted && companyForm.get('upin')?.['invalid'] }"
                placeholder="Unesite UPIN"
                />
            </div>

            <div class="mb-3">
              <label for="address" class="form-label">Adresa</label>
              <input
              type="text"
              id="address"
              class="form-control"
              formControlName="address"
              [ngClass]="{ 'is-invalid': submitted && companyForm.get('address')?.['invalid'] }"
              placeholder="Unesite adresu"
              />
            </div>

            <div class="mb-3">
              <label for="country" class="form-label">Država</label>
              <input
              type="text"
              id="country"
              class="form-control"
              formControlName="country"
              [ngClass]="{ 'is-invalid': submitted && companyForm.get('country')?.['invalid'] }"
              placeholder="Unesite državu"
              />
            </div>

            <div class="mb-3">
              <label for="city" class="form-label">Grad</label>
              <input
              type="text"
              id="city"
              class="form-control"
              formControlName="city"
              [ngClass]="{ 'is-invalid': submitted && companyForm.get('city')?.['invalid'] }"
              placeholder="Unesite grad"
              />
            </div>



            <div class="mb-3">
              <label for="phone" class="form-label">Zip kod</label>
              <input
              type="number"
              id="postalCode"
              class="form-control"
              formControlName="postalCode"
              [ngClass]="{ 'is-invalid': submitted && companyForm.get('postalCode')?.['invalid'] }"
              placeholder="Unesite zip kod"
              />
            </div>

            <div class="mb-3">
              <label for="website" class="form-label">Web sajt</label>
              <input
              type="text"
              id="website"
              class="form-control"
              formControlName="website"
              [ngClass]="{ 'is-invalid': submitted && companyForm.get('website')?.['invalid'] }"
              placeholder="Unesite web sajt"
              />
            </div>

        </form>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="close()">Zatvori</button>
        <button type="submit" class="btn btn-primary" (click)="onSubmit()">Potvrdi</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop fade" [ngClass]="{'show': show}" *ngIf="show"></div>
