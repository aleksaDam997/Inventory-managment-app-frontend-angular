<div class="bg-white shadow-sm p-3 rounded mb-4 flex-shrink-0">
<h2>Menadžment Filijala 🎉</h2>
<p>Ovdje možete pratiti sve filijale i njihove informacije.</p>
</div>

<div class="d-flex justify-content-end mb-3">
  <button class="btn btn-primary" (click)="openCreateOUModal()">Dodaj Filijalu</button>

</div>

<form class="row g-3 align-items-end" [formGroup]="filterForm" (ngSubmit)="onFilterSubmit()">
  @if(role === 'ADMIN') {
    <div class="col-12 col-md-2">
      <label for="companySelected" class="form-label">Firma</label>
      <select id="companySelected" class="form-select" formControlName="companyId" required>
        <option value="0" selected>Sve firme</option>
        <option *ngFor="let company of companies" [value]="company.companyId">{{ company.name }}</option>
      </select>
    </div>

    <div class="col-12 col-md-2">
      <button class="btn btn-sm btn-outline-success w-100" type="submit">Filtriraj</button>
    </div>
  }
</form>

<div class="mt-3">
    <table class="table table-borderless text-center">
  <thead>
    <tr>
      <th scope="col">Id</th>
      <th scope="col">Naziv</th>
      <th scope="col">Šifra</th>
      <th scope="col">Akcije</th>
    </tr>
  </thead>
  <tbody>

    <tr *ngFor="let orgUnit of orgUnits;" class="align-middle">
      <th>{{ orgUnit.orgUnitId }}</th>
      <td>{{ orgUnit.name }}</td>
      <td>{{ orgUnit.code }}</td>
      <td>
        <button class="btn btn-sm btn-outline-primary me-md-1 mb-sm-1 mb-md-0" (click)="openUpdateOUModal(orgUnit)">
          <i class="bi bi-pencil"></i>
        </button>
        <button class="btn btn-sm btn-outline-danger" (click)="deleteOrgUnit(orgUnit.orgUnitId)">
          <i class="bi bi-trash"></i>
        </button>
      </td>
    </tr>

  </tbody>
</table>
</div>

<app-upsert-ou-modal
  [show]="showModal"
  [isCreateCompanyModal]="isCreateCompanyModal"
  (closed)="closeModal()"
  [companies]="companies"
  (confirmed)="confirmModal($event)"
  [orgUnitForm]="orgUnitForm"
  [title]="modalTitle"
></app-upsert-ou-modal>
