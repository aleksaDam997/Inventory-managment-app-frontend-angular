<nav class="main-header">
  <div class="header-container">
    <!-- Logo -->
    <a class="logo-link" routerLink="/">
      <img src="logo.png" alt="Logo" class="logo">
    </a>

    <!-- Hamburger button (mobile only) -->
    <button class="hamburger-btn d-md-none" 
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#headerContent"
            aria-controls="headerContent"
            aria-expanded="false"
            aria-label="Toggle menu">
      <span class="hamburger-icon"></span>
    </button>

    <!-- Collapsible content -->
    <div class="collapse navbar-collapse d-md-flex" id="headerContent">
      <!-- Navigation links -->
      <ul class="nav-links">
        <li>
          <a routerLink="/news" routerLinkActive="active">
            <i class="bi bi-house-door me-1"></i>
            Početna
          </a>
        </li>
        <li>
          <a routerLink="/control-panel" routerLinkActive="active">
            <i class="bi bi-envelope me-1"></i>
            Kontakt
          </a>
        </li>
      </ul>

      <!-- Icons/Dropdowns -->
      <div class="header-actions">
        <!-- Notifications -->
        <div class="dropdown">
          <button class="icon-btn" 
                  id="dropdownNotification"
                  data-bs-toggle="dropdown"
                  aria-expanded="false">
            <i class="bi bi-bell"></i>
            <span class="badge">{{ notifications ? notifications.length : 0 }}</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow" 
              aria-labelledby="dropdownNotification">
            <li class="dropdown-header">Notifikacije</li>

            @for (notification of notifications; track $index) {
              <li>
                <button
                  type="button"
                  class="dropdown-item w-100 text-start"
                  (click)="onNotificationClick(notification)">
                  <i class="bi bi-info-circle me-2"></i>
                  {{ notification.message }}
                </button>
              </li>
            }

            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-center small" href="#">Prikaži sve</a></li>
          </ul>
        </div>

        <!-- Filter -->
        <div class="dropdown">
          <button class="icon-btn" 
                  id="dropdownMenu"
                  data-bs-toggle="dropdown"
                  aria-expanded="false">
            <i class="bi bi-filter-square"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow" 
              aria-labelledby="dropdownMenu">
            <li class="dropdown-header">Filteri</li>
            <li><a class="dropdown-item" href="#"><i class="bi bi-funnel me-2"></i>So</a></li>
            <li><a class="dropdown-item" href="#"><i class="bi bi-funnel me-2"></i>Biber</a></li>
          </ul>
        </div>

        <!-- User -->
        <div class="dropdown">
          <button class="icon-btn" 
                  id="dropdownUser"
                  data-bs-toggle="dropdown"
                  aria-expanded="false">
            <i class="bi bi-person-circle"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow" 
              aria-labelledby="dropdownUser">
            <li class="dropdown-header">Moj Nalog</li>
            <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i>Podešavanja</a></li>
            <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Profil</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#"><i class="bi bi-box-arrow-right me-2"></i>Odjavi se</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>
