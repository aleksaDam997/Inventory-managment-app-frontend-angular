<div class="login-card">
  <h3 class="text-center mb-4">Prijava</h3>
  <form (ngSubmit)="onLogin()" [formGroup]="loginForm">
    <div class="mb-3">
      <label for="username" class="form-label">Korisničko ime ili Email</label>
      <input type="text" class="form-control" id="username" formControlName="username" placeholder="Unesite korisničko ime ili email" required>
    </div>
<!-- <a href="ms-excel:ofe|u|https://10.0.120.36:8181/insureq/webdav/9055/OBAVJEŠTENJE O REZERVACIJI ŠTETE-1450 DEVIZNI NALOG.xlsx">Otvori u Word-u</a> -->

    <div class="mb-3">
      <label for="password" class="form-label">Lozinka</label>
      <input type="password" class="form-control" id="password" formControlName="password" placeholder="Unesite lozinku " required>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="form-check">
        <input type="checkbox" class="form-check-input" id="remember" formControlName="rememberMe">
        <label for="remember" class="form-check-label">Zapamti me</label>
      </div>
      <a routerLink="/forgot-password">Zaboravljena lozinka?</a>
    </div>

    <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid">
      Prijava
    </button>
  </form>

  <p class="text-center mt-3">
    Don't have an account? <a routerLink="/register">Sign up</a>
  </p>
</div>
