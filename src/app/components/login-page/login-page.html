<div class="login-card">
  <h3 class="text-center mb-4">Prijava</h3>
  <form (ngSubmit)="onLogin()" [formGroup]="loginForm">
    <div class="mb-3">
      <label for="username" class="form-label">Korisničko ime ili Email</label>
      <input type="text" class="form-control" id="username" formControlName="username" placeholder="Unesite korisničko ime ili email" required>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Lozinka</label>
      <input type="password" class="form-control" id="password" formControlName="password" placeholder="Unesite lozinku " required>
    </div>



    <div class="d-flex justify-content-center">
      <button type="submit" class="btn btn-primary mt-2 w-50" [disabled]="loginForm.invalid">
        Prijava
      </button>
    </div>
  </form>
</div>
